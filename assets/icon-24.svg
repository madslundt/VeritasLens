             L 18 8
             C 19.7 8, 21 9.3, 21 11
             L 21 12.5
             C 21 14.2, 19.7 15.5, 18 15.5
             L 15 15.5
             C 13.6 15.5, 12.5 14.4, 12.5 13 Z
             M 17 9.6
